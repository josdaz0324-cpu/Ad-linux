[sssd]
domains = corp.local
config_file_version = 2
services = nss, pam

[domain/corp.local]
# Core AD Integration Providers
id_provider = ad
auth_provider = ad
chpass_provider = ad
access_provider = ad

# Domain Controller Connectivity Settings
ad_domain = corp.local
krb5_realm = CORP.LOCAL
ad_server = 192.168.100.X

# Hardening Policy: Disabled to prevent offline logon hours policy bypass
cache_credentials = false

# User Environment Layout Mapping
ldap_id_mapping = True
default_shell = /bin/bash
fallback_homedir = /home/%u@%d



